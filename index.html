<style>
body {
  margin: 0;
  padding: 20px;
  background: #0b1520;
  font-family: serif;
  color: #ffffff;
}

h1 {
  text-align: center;
  margin-bottom: 4px;
  font-size: 84px;
  
}

.banner{
  width:100%;
  margin: 0 0 24px 0;      /* espaço antes dos cards */
  border-radius:14px;
  overflow:hidden;
  border:1px solid #2c4c6b;
  background:#162b3f;
  
  /* controla a “altura” mantendo responsivo */
  aspect-ratio: 16 / 9;    /* ajusta: 16/6 fica mais alto */
}

.banner img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
  object-position:center 12%;
}

/* GRID - DESKTOP */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  width: 100%;
}

/* CARD */
.card {
  text-decoration: none;
  color: white;
  background: #0f1e2e;
  border: 1px solid #2c4c6b;
  border-radius: 14px;
  text-align: center;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* IMAGEM */
.icon-box {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #162b3f;
  border-bottom: 1px solid #2c4c6b;
  overflow: hidden;
}

.icon-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* TÍTULO */
.card h2 {
  margin: 12px 0 14px 0;
  font-size: 18px;
  font-weight: normal;
}


.main-title{
  text-align:center;
  font-size:56px;
  letter-spacing:2px;
  color:#f2f5f8;
  text-shadow:0 0 12px rgba(200, 211, 223, 0.15);
}

.main-subtitle{
  text-align:center;
  font-size:14px;
  color:#8fa3b8;
  font-style:italic;
  margin-bottom:20px;
  opacity:0.7;
  letter-spacing:0.5px;
}


.main-subtitle{
  text-align:center;
  font-size:45px;
  color:#8fa3b8;
  font-style:italic;
  margin-bottom:20px;
  opacity:0.7;
  letter-spacing:0.5px;
  display:inline-block;
}

.main-subtitle:hover{
  animation:subtitleShake 0.18s linear infinite;
}

@keyframes subtitleShake{
  0%   { transform:translate(0, 0); }
  25%  { transform:translate(-0.5px, 0.5px); }
  50%  { transform:translate(0.5px, -0.5px); }
  75%  { transform:translate(-0.5px, -0.5px); }
  100% { transform:translate(0, 0); }
}

.subtitle-wrap{
  text-align:center;
}

/* 📱 CELULAR (1 POR LINHA) */
@media (max-width: 600px) {
  body {
    padding: 16px;
  }
  h1 {
  text-align: center;
  margin-bottom: 4px;
  font-size: 36px;
  
}

  .grid {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .card h2 {
    font-size: 20px;
  }
}

.main-title{
  font-size:28px;
}

.main-subtitle{
  font-size:14px;
}

/* 📲 TABLET (2 POR LINHA) */
@media (min-width: 601px) and (max-width: 1024px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
    .banner{
    aspect-ratio: 16 / 7;  /* ajusta se quiser */
    margin-bottom: 20px;
  }
  
  h1 {
  text-align: center;
  margin-bottom: 4px;
  font-size: 54px;
  
}

.main-subtitle{
  font-size:14px;
}
  
}
</style>
</head>
