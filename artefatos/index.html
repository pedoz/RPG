<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artefatos e Relíquias</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#0b1520;
  font-family:serif;
  color:#fff;
}

h1,h2,h3,h4,p{
  margin-top:0;
}

.page-title{
  text-align:center;
  margin-bottom:10px;
}

.page-subtitle{
  text-align:center;
  color:#cfd8e3;
  margin-bottom:24px;
  font-style:italic;
}

.artifact-grid{
  display:grid;
  grid-template-columns:repeat(3, minmax(0, 1fr));
  gap:16px;
  align-items:start;
}

.artifact-card{
  border:1px solid #2c4c6b;
  border-radius:28px;
  overflow:hidden;
  background:#0f1e2e;
}

.artifact-card summary{
  list-style:none;
  cursor:pointer;
  display:block;
  background:#102235;
  transition:background 0.2s;
}

.artifact-card summary:hover{
  background:#13283d;
}

.artifact-card summary::-webkit-details-marker{
  display:none;
}

.artifact-media{
  width:100%;
  aspect-ratio:1 / 1;
  overflow:hidden;
  background:#162b3f;
  border-bottom:1px solid #2c4c6b;
}

.artifact-media img{
  width:100%;
  height:100%;
  display:block;
  object-fit:cover;
}

.artifact-name{
  padding:12px 14px;
  text-align:center;
  font-size:19px;
  background:#102235;
  position:relative;
}

.artifact-name::after{
  content:"+";
  position:absolute;
  right:14px;
  top:50%;
  transform:translateY(-50%);
  font-size:20px;
  color:#c8d3df;
}

.artifact-card[open] .artifact-name::after{
  content:"–";
}

.artifact-body{
  padding:14px;
  border-top:1px solid #2c4c6b;
}

.artifact-body p{
  margin:0 auto 12px auto;
  max-width:95%;
}

.artifact-body p:last-child{
  margin-bottom:0;
}

.artifact-meta{
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.artifact-tag{
  display:inline-block;
  padding:4px 8px;
  border-radius:999px;
  border:1px solid #2c4c6b;
  background:#11263a;
  font-size:13px;
  color:#d7e1eb;
}

.artifact-note{
  margin-top:14px;
  padding-left:12px;
  border-left:2px solid #2c4c6b;
  font-style:italic;
  font-size:16px;
  line-height:1.55;
  color:#c8d3df;
}

.artifact-note-author{
  display:block;
  margin-top:6px;
  margin-botton:6px;
  font-size:13px;
  color:#8fa3b8;
}

.header{
  margin-top:36px;
}

.header-nav{
  display:flex;
  gap:10px;
  width:100%;
}

.header-nav a{
  flex:1;
  text-align:center;
  padding:10px 8px;
  background:#0f2a44;
  border:1px solid #2c4c6b;
  border-radius:8px;
  color:#fff;
  text-decoration:none;
  font-size:14px;
  white-space:nowrap;
  transition:background 0.2s, transform 0.2s;
}

.header-nav a:hover{
  background:#163b5c;
  transform:translateY(-2px);
}

@media (max-width: 900px){
  .artifact-grid{
    grid-template-columns:repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 700px){
  body{
    padding:16px;
  }

  .artifact-grid{
    grid-template-columns:1fr;
  }

  .artifact-media{
    aspect-ratio:1 / 1;
  }

  .artifact-name{
    font-size:18px;
  }
}
</style>
</head>
