        <div class="curious-header">
          <h4 class="curious-title">Os sinos que não tocam</h4>
        </div>
      </div>
    </summary>

    <div class="curious-body">
      <div class="curious-quick">
        Em alguns povoados, sinos antigos continuam pendurados não para serem usados, mas para lembrarem que um dia precisaram ser.
      </div>

      <p>
        Em certas regiões, há sinos mantidos em praças, torres ou portões que não devem mais ser tocados.
        O motivo muda de cidade para cidade: alguns dizem que é respeito, outros dizem que é medo, e alguns
        simplesmente não sabem mais explicar.
      </p>

      <p>
        O fato curioso é que, mesmo esquecendo o motivo original, os moradores costumam preservar a regra
        com um zelo quase automático — como se certas proibições sobrevivessem melhor do que suas razões.
      </p>

      <div class="curious-highlight">
        Não é incomum que crianças locais conheçam a regra antes mesmo de saberem o nome da praça onde o sino está.
      </div>

      <div class="curious-note">
        “Tem coisa que o povo para de entender, mas não para de obedecer.”
        <span class="curious-note-author">— comentário comum entre viajantes velhos</span>
      </div>

      <div class="curious-meta">
        <span class="curious-tag">Costume</span>
        <span class="curious-tag">Tradição residual</span>
        <span class="curious-tag">Atmosfera</span>
      </div>

      <div class="curious-footer">Registro oral</div>
    </div>
  </details>

      <p>

      <p>
        Isso não significa necessariamente magia no sentido formal. Muitas vezes é apenas um desconforto cultural,
